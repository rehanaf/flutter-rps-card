name: Flutter Multi-Platform Auto Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ==========================================
  # JOB 1: BUILD ANDROID & WEB (Runner: Ubuntu)
  # ==========================================
  build-android-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Mengaktifkan cache agar build berikutnya jauh lebih cepat

      - name: Install Dependencies
        run: flutter pub get

      # Build Android (APK)
      - name: Build Android APK
        run: flutter build apk --release

      # Build Web
      - name: Build Web
        run: flutter build web --release

      # Upload Artifact Android
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk

      # Upload Artifact Web
      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web

  # ==========================================
  # JOB 2: BUILD WINDOWS (Runner: Windows)
  # ==========================================
  build-windows:
    runs-on: windows-2025
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      # Enable Windows Desktop Build
      - name: Enable Windows Build
        run: flutter config --enable-windows-desktop

      # Build Windows executable
      - name: Build Windows
        run: flutter build windows --release

      # Upload Artifact Windows (Folder ZIP berisi .exe dan .dll pendukung)
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release

  # ==========================================
  # JOB 3: BUILD IOS & MACOS (Runner: macOS)
  # ==========================================
  build-ios-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      # Enable macOS Desktop Build
      - name: Enable macOS Build
        run: flutter config --enable-macos-desktop

      # Build iOS (Tanpa Code Signing)
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # Build macOS app
      - name: Build macOS
        run: flutter build macos --release

      # Upload Artifact iOS
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-no-codesign
          path: build/ios/iphoneos

      # Upload Artifact macOS
      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release
